name: Build and deploy

on:
  push:
    branches:
      - main
      - validation

# Protected-branch deploys must not be cancelled mid-flight, but we still
# group runs so concurrent pushes serialize cleanly per branch.
concurrency:
  group: auto-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'integration' || 'validation' }}

jobs:
  prepare:
    name: Prepare build context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Compute version
        id: version
        run: echo "value=${{ env.ENVIRONMENT }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-docker:
    name: Build ${{ matrix.image }} image
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image: [anonymize, worker, backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1

      - name: Build and push ${{ matrix.image }} image
        uses: ./.github/actions/build-docker
        with:
          image: ${{ matrix.image }}
          version: ${{ needs.prepare.outputs.version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

  trivy-scan:
    name: Trivy scan ${{ matrix.image }}
    needs: [prepare, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [anonymize, worker, backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1

      - name: Resolve image reference
        id: ref
        run: |
          NORMALIZED_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "value=ghcr.io/${NORMALIZED_REPO}:${{ needs.prepare.outputs.version }}-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan
        uses: ./.github/actions/trivy-image-scan
        with:
          image-ref: ${{ steps.ref.outputs.value }}
          category: trivy-container-${{ matrix.image }}

  deploy:
    name: Deploy ${{ needs.prepare.outputs.version }}
    needs: [prepare, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1

      - name: Deploy to GitOps
        uses: ./.github/actions/deploy-gitops
        with:
          environment: ${{ env.ENVIRONMENT }}
          version: ${{ needs.prepare.outputs.version }}
          gitops-repo-key: ${{ secrets.GITOPS_REPO_KEY }}
          helm-repo-pat: ${{ secrets.HELM_REPO_PAT }}

  e2e-tests:
    name: E2E (shard ${{ matrix.shard }}/${{ matrix.total }})
    if: github.ref_name == 'main'
    needs: [prepare, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        total: [3]

    env:
      BASE_URL: https://sirena.${{ github.ref_name == 'main' && 'integration' || 'validation' }}.dev.atlas.fabrique.social.gouv.fr

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: apps/frontend

      - name: Resolve Playwright version
        id: pw_version
        run: |
          VERSION=$(node -p "require('./apps/frontend/package.json').devDependencies['@playwright/test'].replace(/^\^|~/, '')")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw_cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw_version.outputs.value }}

      - name: Install Playwright browsers (cache miss)
        if: steps.pw_cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend

      - name: Install Playwright OS deps (cache hit)
        if: steps.pw_cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: apps/frontend

      - name: Wait for deployment
        run: npx tsx tests/ci/wait-for-deployment.ts
        working-directory: apps/frontend
        env:
          EXPECTED_VERSION: ${{ needs.prepare.outputs.version }}
          BACKEND_URL: ${{ env.BASE_URL }}/api
          FRONTEND_URL: ${{ env.BASE_URL }}

      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/${{ matrix.total }}
        working-directory: apps/frontend
        env:
          FRONTEND_URI: ${{ env.BASE_URL }}
          E2E_CI: true
          E2E_ENTITY_ADMIN_USER_1_EMAIL: ${{ vars.TEST_USER_EMAIL }}
          E2E_ENTITY_ADMIN_USER_1_PASSWORD: ${{ vars.TEST_USER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        if: always()
        continue-on-error: true
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/frontend/playwright-report/
          retention-days: 1
