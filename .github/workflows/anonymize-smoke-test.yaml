name: Anonymize Smoke Test

on:
  push:
    paths:
      - "apps/anonymize/**"
      - "packages/db/prisma/**"

concurrency:
  group: anonymize-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke-test:
    name: Validate Greenmask schema sync
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sirena_test
          POSTGRES_USER: sirena
          POSTGRES_PASSWORD: sirena
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sirena"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_URL: postgresql://sirena:sirena@localhost:5432/sirena_test

    steps:
      - uses: actions/checkout@1cce3390c2bfda521930d01229c073c7ff920824 # v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm --filter @sirena/db run deploy

      - name: Build anonymize image
        run: docker build -t sirena-anonymize-test apps/anonymize

      - name: Validate Greenmask config against schema
        run: |
          docker run --rm --network=host \
            -e PG_URL_FROM="postgresql://sirena:sirena@localhost:5432/sirena_test" \
            -e PG_URL_TO="postgresql://sirena:sirena@localhost:5432/sirena_test" \
            sirena-anonymize-test \
            greenmask --config=/app/greenmask.yml validate
