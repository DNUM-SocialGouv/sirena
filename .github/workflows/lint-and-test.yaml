name: Lint and Unit Tests

on:
  push:

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest
    env:
      PG_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6
      - name: Use Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: "pnpm"
      # TODO: revert to pnpm audit when fixed (https://github.com/pnpm/pnpm/issues/11265)
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
      - name: Install dependencies
        run: pnpm install
      - name: Run linter
        run: pnpm lint
      - name: Run gitLeaks
        run: pnpm gitleaks:ci
      - name: Build common
        run: pnpm build:common
      - name: Build backend-utils
        run: pnpm build:backend-utils
      - name: Generate types
        run: pnpm db:generate
      - name: build db
        run: pnpm build:db
      - name: Build backend
        run: pnpm build:backend
      - name: Run tests
        run: pnpm test:unit
