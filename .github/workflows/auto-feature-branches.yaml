name: Feature branches - build

on:
  push:
    branches-ignore:
      - main
      - validation
      - formation
      - production
      - preproduction
      # branch use to deploy on test env
      - chore/deploy

# Feature branches are cheap to rebuild: cancel previous runs on the same
# branch to avoid wasting minutes when the user pushes follow-up commits.
concurrency:
  group: feature-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare build context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Compute short sha
        id: version
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-docker:
    name: Build ${{ matrix.image }} image
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image: [anonymize, worker, backend, frontend]
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          fetch-depth: 1

      - name: Build and push ${{ matrix.image }} image
        uses: ./.github/actions/build-docker
        with:
          image: ${{ matrix.image }}
          version: ${{ needs.prepare.outputs.version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
