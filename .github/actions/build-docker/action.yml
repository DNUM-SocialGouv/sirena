name: 'Build and Push a Docker Image'
description: 'Build and push a single Sirena Docker image (anonymize, worker, backend or frontend) to GHCR with shared BuildKit cache.'

inputs:
  image:
    description: "Image to build: one of anonymize, worker, backend, frontend"
    required: true
  registry:
    description: 'Container registry URL'
    required: false
    default: 'ghcr.io'
  image-name:
    description: 'Base image name'
    required: false
    default: '${{ github.repository }}'
  version:
    description: 'Version identifier for tagging (tag name or short SHA)'
    required: true
  github-token:
    description: 'GitHub token for registry login'
    required: true
  sentry-auth-token:
    description: 'Sentry auth token (only used by backend/frontend builds)'
    required: false
    default: ''
  cache-fallback-ref:
    description: 'Git ref name used as cross-branch BuildKit cache fallback (typically main)'
    required: false
    default: 'main'

outputs:
  image-ref:
    description: 'Fully-qualified image reference that was built (or that already existed)'
    value: ${{ steps.meta.outputs.image-ref }}
  skipped:
    description: 'true if the image already existed in the registry'
    value: ${{ steps.exists.outputs.skipped }}

runs:
  using: 'composite'
  steps:
    - name: Log in to the Container registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Resolve image reference
      id: meta
      shell: bash
      run: |
        NORMALIZED_REPO=$(echo "${{ inputs.image-name }}" | tr '[:upper:]' '[:lower:]')
        REF="${{ inputs.registry }}/${NORMALIZED_REPO}:${{ inputs.version }}-${{ inputs.image }}"
        echo "image-ref=${REF}" >> "$GITHUB_OUTPUT"
        echo "NORMALIZED_REPO=${NORMALIZED_REPO}" >> "$GITHUB_ENV"

    - name: Check if image already exists in registry
      id: exists
      shell: bash
      run: |
        if docker manifest inspect "${{ steps.meta.outputs.image-ref }}" > /dev/null 2>&1; then
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "Image ${{ steps.meta.outputs.image-ref }} already exists, skipping build."
        else
          echo "skipped=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Docker Buildx
      if: steps.exists.outputs.skipped == 'false'
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    - name: Compute build matrix for image
      if: steps.exists.outputs.skipped == 'false'
      id: build_spec
      shell: bash
      run: |
        case "${{ inputs.image }}" in
          anonymize)
            echo "context=apps/anonymize" >> "$GITHUB_OUTPUT"
            echo "dockerfile=apps/anonymize/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "needs_sentry=false" >> "$GITHUB_OUTPUT"
            echo "build_args=" >> "$GITHUB_OUTPUT"
            ;;
          worker)
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "dockerfile=apps/backend/Dockerfile.worker" >> "$GITHUB_OUTPUT"
            echo "needs_sentry=true" >> "$GITHUB_OUTPUT"
            echo "build_args=" >> "$GITHUB_OUTPUT"
            ;;
          backend)
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "dockerfile=apps/backend/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "needs_sentry=true" >> "$GITHUB_OUTPUT"
            echo "build_args=APP_VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            ;;
          frontend)
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "dockerfile=apps/frontend/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "needs_sentry=true" >> "$GITHUB_OUTPUT"
            {
              echo "build_args<<EOF"
              echo "SENTRY_ENABLED=true"
              echo "APP_VERSION=${{ inputs.version }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Unknown image: ${{ inputs.image }}" >&2
            exit 1
            ;;
        esac

    - name: Build and push image (with Sentry)
      if: steps.exists.outputs.skipped == 'false' && steps.build_spec.outputs.needs_sentry == 'true'
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ steps.build_spec.outputs.context }}
        file: ${{ steps.build_spec.outputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.image-ref }}
        build-args: ${{ steps.build_spec.outputs.build_args }}
        secrets: |
          SENTRY_AUTH_TOKEN=${{ inputs.sentry-auth-token }}
        cache-from: |
          type=gha,scope=${{ inputs.image }}-${{ github.ref_name }}
          type=gha,scope=${{ inputs.image }}-${{ inputs.cache-fallback-ref }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image }}-${{ github.ref_name }}
        platforms: linux/amd64
        provenance: false

    - name: Build and push image (no Sentry)
      if: steps.exists.outputs.skipped == 'false' && steps.build_spec.outputs.needs_sentry == 'false'
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ steps.build_spec.outputs.context }}
        file: ${{ steps.build_spec.outputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.image-ref }}
        cache-from: |
          type=gha,scope=${{ inputs.image }}-${{ github.ref_name }}
          type=gha,scope=${{ inputs.image }}-${{ inputs.cache-fallback-ref }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image }}-${{ github.ref_name }}
        platforms: linux/amd64
        provenance: false
