server {
  listen       8080;
  server_name  _;
  root   /usr/share/nginx/html;
  index  index.html;

  # Hide the nginx version from error pages; `more_clear_headers` then
  # strips the `Server` response header entirely.
  server_tokens off;
  more_clear_headers 'Server';

  # Security headers shared across every response.
  # Unlike `add_header`, `more_set_headers` propagates from the server
  # context to nested locations even when those declare their own headers.
  more_set_headers 'X-Content-Type-Options: nosniff'
                   'Referrer-Policy: strict-origin-when-cross-origin'
                   'X-Frame-Options: SAMEORIGIN'
                   'Permissions-Policy: geolocation=(), microphone=(), camera=()';

  # --- Compression ---------------------------------------------------------
  gzip               on;
  gzip_vary          on;
  gzip_comp_level    6;
  gzip_min_length    1024;
  gzip_proxied       any;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    font/ttf
    image/svg+xml
    image/x-icon
    text/css
    text/javascript
    text/plain
    text/xml;

  # Serve pre-compressed *.gz files when available (zero per-request CPU cost).
  # Falls back to dynamic gzip above when no .gz sibling is present.
  gzip_static on;

  # --- Hashed static assets: cache forever --------------------------------
  # Vite emits content-hashed filenames under /assets/, so they are safe
  # to cache indefinitely; a new deploy ships new file names.
  location /assets/ {
    access_log off;

    # Block source maps as defense-in-depth; the Dockerfile also strips them.
    location ~ \.map$ { return 404; }

    more_set_headers 'Cache-Control: public, max-age=31536000, immutable';
    try_files $uri =404;
  }

  # --- Runtime-generated env.js: never cache ------------------------------
  location = /env.js {
    expires off;
    etag off;
    more_set_headers 'Cache-Control: no-store';
  }

  # --- SPA shell + everything else ----------------------------------------
  location / {
    # index.html must always be revalidated so users pick up new deploys.
    more_set_headers 'Cache-Control: no-cache';
    try_files $uri $uri/ /index.html;
  }
}
