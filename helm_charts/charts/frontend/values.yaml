---
SDPSN-devops-charts:
  name: frontend

  deployment:
    image: ghcr.io/dnum-socialgouv/sirena:latest-frontend
    imagePullSecretsName: registry-secret

    readinessProbe:
      enable: false
    livenessProbe:
      enable: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /
      timeoutSeconds: 5

    resources:
      limits:
        cpu: 250m
        memory: 900Mi
      requests:
        cpu: 250m
        memory: 900Mi

  appVariables:
    IS_LOGGED_TOKEN_NAME: is_logged_token
    SENTRY_ENABLED: "true"
    SENTRY_DSN_FRONTEND: "https://86ed3a86e8f1e2d912d73bdec47b30e3@sentry2.fabrique.social.gouv.fr/55"
    MATOMO_URL: "https://matomo.fabrique.social.gouv.fr"
    MATOMO_SITE_ID: "155"

  enableSecurityHeaders: true
  securityHeaders:
    Content-Security-Policy: >-
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://matomo.fabrique.social.gouv.fr https://jsd-widget.atlassian.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      font-src 'self' data:;
      connect-src 'self' https://matomo.fabrique.social.gouv.fr https://sentry2.fabrique.social.gouv.fr https://*.atlassian.com https://*.ingest.sentry.io;
      worker-src 'self' blob:;
      frame-ancestors 'none'

  ingress:
    enable: true
    name: frontend
    ingressClassName: public
    host: sirena.formation.prod.atlas.fabrique.social.gouv.fr
    appAnnotations:
      nginx.ingress.kubernetes.io/proxy-body-size: 200m
      nginx.ingress.kubernetes.io/proxy-hide-headers: Server
    paths:
      - path: /
        pathType: Prefix
        serviceName: frontend
        servicePort: 80
    tls:
      hosts:
        - sirena.formation.prod.atlas.fabrique.social.gouv.fr
      secretName: frontend-tls
