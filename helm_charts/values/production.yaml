---
backend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-production

    certificateIssuer:
      enable: true

    appVariables:
      DEMAT_SOCIAL_API_DIRECTORY: "923"
      DEMAT_SOCIAL_API_URL: "https://demat.social.gouv.fr/api/v2/graphql"
      HOST: https://sirena-sante.social.gouv.fr
      PC_DOMAIN: https://auth.agentconnect.gouv.fr/api/v2
      PC_REDIRECT_URI: https://sirena-sante.social.gouv.fr/api/auth/callback
      FRONTEND_REDIRECT_URI: https://sirena-sante.social.gouv.fr/home
      FRONTEND_REDIRECT_LOGIN_URI: https://sirena-sante.social.gouv.fr/login
      FRONTEND_URI: https://sirena-sante.social.gouv.fr
      REDIS_TLS: "true"
      PG_SSL_ALLOW_SELF_SIGNED: "true"
      APP_ENV: production
      TIPIMAIL_DISABLE_SENDING: "false"

    deployment:
      replicas: 2

    ingress:
      host: sirena-sante.social.gouv.fr
      appAnnotations:
        external-dns.alpha.kubernetes.io/hostname: sirena-sante.social.prod.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena-sante.social.gouv.fr
          - sirena-sante.social.prod.atlas.fabrique.social.gouv.fr

external-secrets:
  externalSecret:
    database:
      databaseName: sirena-production

  SDPSN-devops-charts:
    externalSecret:
      redis:
        clusterName: sirena-production-redis
      bucket:
        bucketName: sirena-production-s3

frontend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-production

    appVariables:
      APP_ENV: production
      MATOMO_SITE_ID: "154"

    certificateIssuer:
      enable: true

    deployment:
      replicas: 2

    ingress:
      host: sirena-sante.social.gouv.fr
      appAnnotations:
        external-dns.alpha.kubernetes.io/hostname: sirena-sante.social.prod.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena-sante.social.gouv.fr
          - sirena-sante.social.prod.atlas.fabrique.social.gouv.fr

worker:
  SDPSN-devops-charts:
    deployment:
      replicas: 2
