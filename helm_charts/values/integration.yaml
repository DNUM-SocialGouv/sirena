---
backend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-integration

    appVariables:
      HOST: https://sirena.integration.dev.atlas.fabrique.social.gouv.fr
      PC_DOMAIN: https://fca.integ01.dev-agentconnect.fr/api/v2
      PC_REDIRECT_URI: https://sirena.integration.dev.atlas.fabrique.social.gouv.fr/api/auth/callback
      FRONTEND_REDIRECT_URI: https://sirena.integration.dev.atlas.fabrique.social.gouv.fr/home
      FRONTEND_REDIRECT_LOGIN_URI: https://sirena.integration.dev.atlas.fabrique.social.gouv.fr/login
      FRONTEND_URI: https://sirena.integration.dev.atlas.fabrique.social.gouv.fr
      CRON_DEMAT_SOCIAL: "300"
      REDIS_TLS: "false"
      SENTRY_ENVIRONMENT: integration
      TIPIMAIL_DISABLE_SENDING: "false"
      APP_ENV: integration

    deployment:
      replicas: 1

    ingress:
      host: sirena.integration.dev.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena.integration.dev.atlas.fabrique.social.gouv.fr

external-secrets:
  redis_unmanaged: true
  externalSecret:
    database:
      databaseName: sirena-integration

  SDPSN-devops-charts:
    externalSecret:
      redis:
        enable: false
      bucket:
        bucketName: sirena-integration-s3

frontend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-integration

    deployment:
      replicas: 1

    ingress:
      host: sirena.integration.dev.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena.integration.dev.atlas.fabrique.social.gouv.fr

worker:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-integration

    deployment:
      replicas: 1
