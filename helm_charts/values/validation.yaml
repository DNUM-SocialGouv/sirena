---
anonymize:
  enabled: true

  sirena_db_secret_path: databases/sirena-validation
  anonymize_db_secret_path: databases/sirena-validation-anonymisation

backend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-validation

    appVariables:
      HOST: https://sirena.validation.dev.atlas.fabrique.social.gouv.fr
      PC_DOMAIN: https://fca.integ01.dev-agentconnect.fr/api/v2
      PC_REDIRECT_URI: https://sirena.validation.dev.atlas.fabrique.social.gouv.fr/api/auth/callback
      FRONTEND_REDIRECT_URI: https://sirena.validation.dev.atlas.fabrique.social.gouv.fr/home
      FRONTEND_REDIRECT_LOGIN_URI: https://sirena.validation.dev.atlas.fabrique.social.gouv.fr/login
      FRONTEND_URI: https://sirena.validation.dev.atlas.fabrique.social.gouv.fr
      CRON_DEMAT_SOCIAL: "300"
      REDIS_TLS: "false"
      SENTRY_ENVIRONMENT: validation
      APP_ENV: validation

    deployment:
      replicas: 1

    ingress:
      host: sirena.validation.dev.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena.validation.dev.atlas.fabrique.social.gouv.fr

external-secrets:
  redis_unmanaged: true

  externalSecret:
    database:
      databaseName: sirena-validation

  SDPSN-devops-charts:
    externalSecret:
      redis:
        enable: false
      bucket:
        bucketName: sirena-validation-s3

frontend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-validation

    deployment:
      replicas: 1

    ingress:
      host: sirena.validation.dev.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena.validation.dev.atlas.fabrique.social.gouv.fr

worker:
  SDPSN-devops-charts:
    deployment:
      replicas: 1
