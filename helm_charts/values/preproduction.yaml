---
backend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-preproduction

    appVariables:
      HOST: https://sirena.preproduction.prod.atlas.fabrique.social.gouv.fr
      PC_DOMAIN: https://auth.agentconnect.gouv.fr/api/v2
      PC_REDIRECT_URI: https://sirena.preproduction.prod.atlas.fabrique.social.gouv.fr/api/auth/callback
      FRONTEND_REDIRECT_URI: https://sirena.preproduction.prod.atlas.fabrique.social.gouv.fr/home
      FRONTEND_REDIRECT_LOGIN_URI: https://sirena.preproduction.prod.atlas.fabrique.social.gouv.fr/login
      FRONTEND_URI: https://sirena.preproduction.prod.atlas.fabrique.social.gouv.fr
      REDIS_TLS: "true"
      SENTRY_ENVIRONMENT: preproduction
      PG_SSL_ALLOW_SELF_SIGNED: "true"

    deployment:
      replicas: 2

    ingress:
      host: sirena.preproduction.prod.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena.preproduction.prod.atlas.fabrique.social.gouv.fr

external-secrets:
  externalSecret:
    database:
      databaseName: sirena-preproduction

  SDPSN-devops-charts:
    externalSecret:
      redis:
        clusterName: sirena-preproduction-redis
      bucket:
        bucketName: sirena-preproduction-s3

frontend:
  SDPSN-devops-charts:
    namespace: org-sdpsn-ws-sirena-preproduction

    deployment:
      replicas: 2

    ingress:
      host: sirena.preproduction.prod.atlas.fabrique.social.gouv.fr
      tls:
        hosts:
          - sirena.preproduction.prod.atlas.fabrique.social.gouv.fr

worker:
  SDPSN-devops-charts:
    deployment:
      replicas: 2
