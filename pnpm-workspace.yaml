packages:
  - packages/*
  - apps/*
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@sentry/cli": true
  esbuild: true
  msgpackr-extract: true
  prisma: true
catalog:
  "@biomejs/biome": ^2.4.16
  "@codegouvfr/react-dsfr": ^1.32.2
  "@hono/standard-validator": ^0.2.2
  "@prisma/adapter-pg": ^7.8.0
  "@prisma/client": ^7.8.0
  "@tanstack/react-router": ^1.170.15
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^14.6.1
  "@types/node": ^25.9.2
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.2
  "@vitest/browser": ^4.1.8
  "@vitest/coverage-v8": ^4.1.8
  clsx: ^2.1.1
  dotenv: ^17.4.2
  hono: ^4.12.25
  hono-openapi: ^1.3.0
  jsdom: ^29.1.1
  prisma: ^7.8.0
  react: ^19.2.7
  react-dom: ^19.2.7
  tsx: ^4.22.4
  typescript: ~6.0.3
  vite: ^8.0.16
  vitest: ^4.1.8
  zod: ^4.4.3
enablePrePostScripts: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - "@esbuild/*"
  - '@opentelemetry/core@2.8.0'
overrides:
  # bullmq épingle ioredis à un patch exact (5.10.1) alors que le backend
  # consomme la branche 5.11.x. Sans alignement, deux copies coexistent et
  # leurs types `Redis` deviennent incompatibles. On unifie l'arbre sur 5.11.x
  # (minor additif, compatible bullmq) pour garder une seule instance.
  ioredis: ^5.11.0
  esbuild@<0.28.1: ">=0.28.1"
  "@hono/node-server@<1.19.13": ">=1.19.13"
  '@opentelemetry/core@<2.8.0': ^2.8.0
  # hono <4.12.25 reste tiré transitivement par prisma > @prisma/dev. Les
  # consommateurs directs sont déjà sur 4.12.25 via le catalog ; l'override
  # aligne le reste de l'arbre (CORS / serve-static / body-limit).
  hono@<4.12.25: ">=4.12.25"
  # js-yaml <4.1.2 transitif (DoS quadratique sur les merge keys).
  js-yaml@<4.1.2: ">=4.1.2"
