packages:
  - packages/*
  - apps/*
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@sentry/cli": true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  # ERD (pnpm db:erd): Puppeteer downloads its Chromium at install time (into
  # ~/.cache/puppeteer, outside node_modules → absent from prod images). Docker
  # builds skip it via PUPPETEER_SKIP_DOWNLOAD (they never render the ERD).
  puppeteer: true
catalog:
  "@biomejs/biome": ^2.5.4
  "@codegouvfr/react-dsfr": ^1.32.4
  "@hono/standard-validator": ^0.2.3
  "@prisma/adapter-pg": ^7.8.0
  "@prisma/client": ^7.8.0
  "@tanstack/react-router": ^1.170.18
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^14.6.1
  "@types/node": ^26.1.1
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.3
  "@vitest/browser": ^4.1.10
  "@vitest/coverage-v8": ^4.1.10
  clsx: ^2.1.1
  dotenv: ^17.4.2
  hono: ^4.12.30
  hono-openapi: ^1.3.1
  jsdom: ^29.1.1
  prisma: ^7.8.0
  react: ^19.2.7
  react-dom: ^19.2.7
  tsx: ^4.23.1
  typescript: ~6.0.3
  vite: ^8.1.4
  vitest: ^4.1.10
  zod: ^4.4.3
enablePrePostScripts: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@opentelemetry/core@2.8.0"
  - undici@7.28.0 || 6.27.0
  - dompurify@3.4.11
  - "@hono/node-server@2.0.10"
  - fast-uri@3.1.4
  - fast-xml-parser@5.10.1
overrides:
  # bullmq épingle ioredis à un patch exact (5.10.1) alors que le backend
  # consomme la branche 5.11.x. Sans alignement, deux copies coexistent et
  # leurs types `Redis` deviennent incompatibles. On unifie l'arbre sur 5.11.x
  # (minor additif, compatible bullmq) pour garder une seule instance.
  ioredis: ^5.11.0
  # @hono/node-server <1.19.13 reste tiré transitivement par prisma > @prisma/dev
  # (contournement de middleware sur serveStatic, GHSA-92pp-h63x-v22m).
  "@hono/node-server@<1.19.13": ">=1.19.13"
  # @hono/node-server 2.x <2.0.10 : fuite mémoire non authentifiée (GHSA-9mqv-5hh9-4cgg).
  "@hono/node-server@>=2.0.0 <2.0.10": ">=2.0.10"
  undici@>=7.0.0 <7.28.0: ^7.28.0
  undici@>=6.26.0 <6.27.0: ^6.27.0
  # fast-uri host confusion via ajv (prisma/commitlint) — GHSA-v2hh-gcrm-f6hx.
  "fast-uri@>=3.0.0 <=3.1.3": ">=3.1.4"
  # fast-xml-parser : reset des déclarations DOCTYPE répétées — GHSA-8r6m-32jq-jx6q.
  "fast-xml-parser@>=5.9.3 <5.10.1": ">=5.10.1"
